# Blocking quality gate. Runs the full local `pnpm run check` matrix on every PR and on
# push to `main`. A workflow alone does NOT block merge — branch protection makes these
# checks REQUIRED (see docs/BRANCH-PROTECTION.md). Gate jobs use NO secrets.
#
# pnpm is activated via corepack AFTER setup-node pins Node 24. pnpm@11.5.0 requires
# Node >=22.13, so it must NOT be self-installed by pnpm/action-setup under the runner's
# default Node (20) — that fails ERR_PNPM_UNSUPPORTED_ENGINE. corepack reads the pinned
# `packageManager` from package.json and runs under Node 24. The pnpm store is cached
# manually (actions/cache) keyed on the lockfile.
name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege GITHUB_TOKEN (T-0-06). The gate needs only to read the repo — it
# performs no writes (no comments, no releases, no deployments). Never grant the broad
# default token. Override per-job if a future job legitimately needs more.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck, lint, format:check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable # activates pinned pnpm@11.5.0 under Node 24
      - run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile # supply-chain integrity (T-0-SC)
      - run: pnpm run ${{ matrix.task }}

  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:boundaries
